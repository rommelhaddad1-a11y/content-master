<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rommel Studio">
<meta name="theme-color" content="#09090B">
<title>Rommel Studio</title>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090B;--bg2:#0F0F12;--bg3:#151518;
  --surface:#1A1A1F;--surface2:#212127;--surface3:#2A2A32;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);--border3:rgba(255,255,255,.16);
  --accent:#C8AA6E;--accent-dim:rgba(200,170,110,.10);--accent-mid:rgba(200,170,110,.20);--accent-glow:rgba(200,170,110,.25);
  --red:#E5484D;--red-dim:rgba(229,72,77,.10);
  --blue:#5B9EF5;--blue-dim:rgba(91,158,245,.10);
  --green:#46A758;--green-dim:rgba(70,167,88,.12);
  --txt:#ECECEF;--txt2:#8B8B9E;--txt3:#52525B;
  --font:'IBM Plex Sans Arabic',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --serif:'Instrument Serif',serif;
  --r:12px;--rs:8px;--rl:16px;
  --ease:cubic-bezier(.22,1,.36,1);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;line-height:1.6;display:flex;flex-direction:column;height:100dvh}
body::after{content:'';position:fixed;inset:0;opacity:.025;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}
button{border:none;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent}
textarea,input{outline:none;font-family:var(--font)}

.header{flex-shrink:0;padding:16px 18px 14px;background:var(--bg);border-bottom:1px solid var(--border);position:relative;z-index:50}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#A08642);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-style:italic;color:#09090B;font-weight:600}
.logo-text{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.5px}
.logo-status{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:1px;transition:color .3s}
.logo-status.ok{color:var(--green)}.logo-status.err{color:var(--red)}
.h-btn{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);padding:6px 12px;font-family:var(--mono);font-size:10px;color:var(--txt2);transition:all .2s var(--ease)}
.h-btn:active{background:var(--surface2);color:var(--txt);border-color:var(--border3)}

.tracks{display:flex;gap:6px;background:var(--surface);border-radius:var(--r);padding:3px;border:1px solid var(--border)}
.track-btn{flex:1;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:600;color:var(--txt3);background:transparent;transition:all .25s var(--ease);display:flex;align-items:center;justify-content:center;gap:6px}
.track-btn .dot{width:6px;height:6px;border-radius:50%;transition:background .25s}
.track-btn.sel-a{background:var(--bg);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.track-btn.sel-a .dot{background:var(--accent)}
.track-btn.sel-b{background:var(--bg);color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.track-btn.sel-b .dot{background:var(--blue)}

.page{display:none;flex:1;overflow:hidden;flex-direction:column}.page.active{display:flex}
.tpl-row{flex-shrink:0;display:flex;gap:6px;padding:12px 18px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tpl-row::-webkit-scrollbar{display:none}
.tpl-chip{white-space:nowrap;padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--txt2);font-size:12px;font-weight:500;transition:all .2s var(--ease);flex-shrink:0}
.tpl-chip:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

.messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:20px;gap:20px}
.w-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),#A08642);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:32px;color:#09090B;box-shadow:0 0 40px var(--accent-glow),0 8px 32px rgba(0,0,0,.4)}
.w-title{font-family:var(--serif);font-size:32px;font-style:italic;line-height:1.2}.w-title span{color:var(--accent)}
.w-sub{font-size:13px;color:var(--txt2);line-height:1.7;max-width:300px}
.w-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:340px;margin-top:4px}
.w-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:14px 12px;text-align:center;transition:all .2s var(--ease)}
.w-card:active{border-color:var(--accent);background:var(--accent-dim)}
.w-card-icon{font-size:22px;margin-bottom:6px}.w-card-txt{font-size:11px;color:var(--txt2);font-weight:500;line-height:1.4}

.msg{display:flex;flex-direction:column;gap:3px;animation:msgIn .3s var(--ease)}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-items:flex-start}.msg.ai{align-items:stretch}
.msg-time{font-family:var(--mono);font-size:10px;color:var(--txt3);padding:0 2px}
.msg.user .msg-body{max-width:85%;padding:10px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r) var(--r) 4px var(--r);font-size:14px;line-height:1.6}
.msg.ai .msg-body{padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);font-size:14px;line-height:1.65}

.script-card{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-top:10px}
.script-block{padding:12px 14px;border-bottom:1px solid var(--border)}.script-block:last-child{border-bottom:none}
.script-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.script-label::before{content:'';width:3px;height:12px;border-radius:2px}
.sl-hook{color:var(--red)}.sl-hook::before{background:var(--red)}
.sl-body{color:var(--accent)}.sl-body::before{background:var(--accent)}
.sl-cta{color:var(--green)}.sl-cta::before{background:var(--green)}
.sl-bridge{color:var(--blue)}.sl-bridge::before{background:var(--blue)}
.sl-note{color:var(--txt2)}.sl-note::before{background:var(--txt3)}
.script-text{font-size:13px;line-height:1.7;color:var(--txt);white-space:pre-wrap;word-break:break-word}
.ai-text{white-space:pre-wrap;word-break:break-word}.ai-text strong{color:var(--txt);font-weight:600}
.track-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.5px;margin-bottom:10px}
.tb-a{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-mid)}
.tb-b{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,158,245,.2)}
.msg-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.act-btn{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);padding:5px 12px;font-family:var(--mono);font-size:10px;color:var(--txt2);transition:all .2s}
.act-btn:active{color:var(--green);border-color:var(--green);background:var(--green-dim)}
.act-btn.save:active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}

.typing{display:flex;gap:10px;align-items:center;padding:6px 0}
.typing-dots{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:12px 18px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dotP 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotP{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

.input-area{flex-shrink:0;padding:10px 18px;padding-bottom:max(10px,var(--safe-b));background:linear-gradient(0deg,var(--bg) 60%,transparent);position:relative;z-index:50;margin-bottom:58px}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rl);padding:6px 8px 6px 14px;transition:border-color .2s}
.input-box:focus-within{border-color:rgba(200,170,110,.35)}
.input-field{flex:1;background:none;border:none;color:var(--txt);font-size:14px;font-family:var(--font);resize:none;max-height:120px;line-height:1.5;padding:6px 0;direction:rtl}
.input-field::placeholder{color:var(--txt3)}
.send-btn{width:38px;height:38px;min-width:38px;border-radius:11px;background:var(--accent);color:#09090B;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;transition:all .2s;flex-shrink:0}
.send-btn:active{transform:scale(.93)}.send-btn:disabled{background:var(--surface3);color:var(--txt3)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-b)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;gap:2px;background:none;color:var(--txt3);font-size:10px;font-weight:600;transition:color .2s}
.nav-item .ni{font-size:20px}.nav-item.active{color:var(--accent)}

.scripts-page{padding:18px;padding-bottom:80px;overflow-y:auto}
.scripts-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.scripts-title{font-family:var(--serif);font-style:italic;font-size:26px}
.scripts-count{font-family:var(--mono);font-size:11px;color:var(--txt2)}
.scripts-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.se-icon{font-size:40px;opacity:.2}.se-txt{font-size:13px;color:var(--txt3);line-height:1.7}
.s-item{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.s-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.s-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.s-num{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:28px}
.s-info{min-width:0}
.s-title-text{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-date{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:1px}
.s-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.s-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 8px;border-radius:5px}
.sb-a{background:var(--accent-dim);color:var(--accent)}.sb-b{background:var(--blue-dim);color:var(--blue)}
.sb-note{background:var(--green-dim);color:var(--green)}
.s-arrow{color:var(--txt3);font-size:12px}
.s-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}.s-body.open{display:block}
.s-content{font-size:13px;line-height:1.65;color:var(--txt2);white-space:pre-wrap;margin-top:12px}
.s-actions{display:flex;gap:6px;margin-top:10px}
.s-btn{background:none;border:1px solid var(--border2);border-radius:var(--rs);padding:5px 10px;font-family:var(--mono);font-size:10px;color:var(--txt2);transition:all .2s}
.s-btn:active{color:var(--txt);border-color:var(--border3)}
.s-edit-area{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--txt);font-size:13px;font-family:var(--font);padding:12px;resize:none;min-height:160px;direction:rtl;line-height:1.65;margin-top:10px}
.s-edit-area:focus{border-color:var(--accent)}
.s-edit-actions{display:flex;gap:8px;margin-top:8px}
.s-save-btn{padding:8px 20px;background:var(--accent);color:#09090B;border-radius:var(--rs);font-size:12px;font-weight:700}
.s-cancel-btn{padding:8px 16px;background:var(--surface2);color:var(--txt2);border-radius:var(--rs);font-size:12px}
.add-note-btn{background:var(--accent);color:#09090B;border-radius:var(--rs);padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:600;transition:all .2s}
.add-note-btn:active{opacity:.8;transform:scale(.96)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl) var(--rl) var(--r) var(--r);padding:22px 20px;width:100%;max-width:400px;animation:modalIn .3s var(--ease)}
@keyframes modalIn{from{transform:translateY(20px);opacity:0}}
.modal-head{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal-input{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);font-size:14px;font-family:var(--font);padding:12px 14px;direction:rtl;margin-bottom:14px;transition:border-color .2s}
.modal-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px}
.modal-save{flex:1;padding:12px;background:var(--accent);color:#09090B;border-radius:var(--r);font-size:14px;font-weight:700}
.modal-save:active{opacity:.8}
.modal-cancel{padding:12px 18px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--txt2);font-size:14px}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--surface);border:1px solid var(--green);border-radius:20px;padding:8px 18px;font-family:var(--mono);font-size:12px;color:var(--green);z-index:300;transition:transform .4s var(--ease);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.word-count{font-family:var(--mono);font-size:9px;color:var(--txt3);margin-top:6px;text-align:left;direction:ltr}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Save Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal-head">💾 حفظ السكربت</div>
    <div id="splitInfo" style="display:none;margin-bottom:12px;padding:10px 12px;background:var(--accent-dim);border:1px solid var(--accent-mid);border-radius:8px;font-size:12px;color:var(--accent);line-height:1.5"></div>
    <input class="modal-input" id="saveTitle" placeholder="اسم السكربت...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeSaveModal()">إلغاء</button>
      <button class="modal-save" onclick="confirmSave()">حفظ</button>
    </div>
    <div id="splitBtns" style="display:none;margin-top:8px">
      <button style="width:100%;padding:12px;background:var(--surface2);border:1px solid var(--accent-mid);border-radius:var(--r);font-size:13px;font-weight:600;color:var(--accent);font-family:var(--font);cursor:pointer" onclick="confirmSaveSplit()">⚡ قسّم واحف�� كل فكرة لحالها</button>
    </div>
  </div>
</div>

<!-- Note Modal -->
<div class="modal-overlay" id="noteModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-head">📝 ملاحظة جديدة</div>
    <input class="modal-input" id="noteTitle" placeholder="العنوان...">
    <textarea id="noteBody" placeholder="اكتب ملاحظتك هون..." style="width:100%;min-height:160px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);font-size:14px;font-family:var(--font);padding:12px 14px;direction:rtl;resize:none;line-height:1.65;margin-bottom:14px;outline:none;transition:border-color .2s" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor=''"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeNoteModal()">إلغاء</button>
      <button class="modal-save" onclick="confirmNote()">حفظ 📝</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div class="logo">
      <div class="logo-mark">R</div>
      <div>
        <div class="logo-text">ROMMEL STUDIO</div>
        <div class="logo-status" id="fbStatus">جاري الاتصال...</div>
      </div>
    </div>
    <button class="h-btn" onclick="clearChat()">مسح ↺</button>
  </div>
  <div class="tracks">
    <button class="track-btn sel-a" id="btnA" onclick="setTrack('A')"><span class="dot"></span>Personal Brand</button>
    <button class="track-btn" id="btnB" onclick="setTrack('B')"><span class="dot"></span>The Matrix</button>
  </div>
</div>

<!-- Chat Page -->
<div class="page active" id="pageChat" style="flex-direction:column;">
  <div class="tpl-row" id="tplRow"></div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcomeScreen">
      <div class="w-icon">R</div>
      <div><div class="w-title">مرحباً، <span>رومل</span></div></div>
      <div class="w-sub" id="wSub">كوبي رايتر وكاتب سكربتات<br>مخصص للبراند الشخصي</div>
      <div class="w-grid" id="wGrid"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <textarea class="input-field" id="msgInput" placeholder="اكتب طلبك..." rows="1" oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- Scripts Page -->
<div class="page" id="pageScripts">
  <div class="scripts-page" id="scriptsContainer"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-item active" id="navChat" onclick="switchPage('chat',this)"><span class="ni">✦</span><span>الاستوديو</span></button>
  <button class="nav-item" id="navScripts" onclick="switchPage('scripts',this)"><span class="ni">◈</span><span id="navScriptsLbl">المحفوظات</span></button>
</div>

<!-- Firebase Module -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, updateDoc, orderBy, query }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
try {
  const fb = initializeApp({
    apiKey:"AIzaSyANM1I9oQTbvMsN8Htmtx2gD0H_qn5ENIY",
    authDomain:"content-master-d8587.firebaseapp.com",
    projectId:"content-master-d8587",
    storageBucket:"content-master-d8587.firebasestorage.app",
    messagingSenderId:"460395104635",
    appId:"1:460395104635:web:041af312db2aaafb50d5de"
  });
  const db = getFirestore(fb);
  window._db = db;
  window._doc = (id) => doc(db,'scripts',id);
  window._q = () => query(collection(db,'scripts'), orderBy('createdAt','desc'));
  window._setDoc = setDoc;
  window._getDocs = getDocs;
  window._deleteDoc = deleteDoc;
  window._updateDoc = updateDoc;
  window._firebaseReady = true;
} catch(e) {
  console.error('Firebase init:', e);
  window._firebaseReady = false;
}
function boot() {
  if (typeof window.loadScripts === 'function') {
    window.loadScripts().then(() => {
      document.getElementById('fbStatus').textContent = '● متصل';
      document.getElementById('fbStatus').classList.add('ok');
    }).catch(() => {

function renderAI(text){

    ?'<div class="track-badge tb-a">PERSONAL BRAND</div>'

  return badge+`<div class="ai-text">${fmt(text)}</div>`;
}

function buildScriptCard(text){
  const secs=[
    {k:/HOOK[:\s]+/i,l:'HOOK',c:'sl-hook'},
    {k:/BODY[:\s]+/i,l:'BODY',c:'sl-body'},
    {k:/CTA[:\s]+/i,l:'CTA',c:'sl-cta'},
    {k:/BRIDGE[:\s]+/i,l:'BRIDGE',c:'sl-bridge'},
    {k:/FILMING[\s]*NOTE[:\s]*/i,l:'FILMING NOTE',c:'sl-note'},
  ];
  const found=secs.map(s=>({...s,pos:text.search(s.k)})).filter(s=>s.pos>=0).sort((a,b)=>a.pos-b.pos);
  if(!found.length)return`<div class="ai-text">${fmt(text)}</div>`;
  const intro=text.substring(0,found[0].pos).trim();
  let html=intro?`<div class="ai-text" style="margin-bottom:10px">${fmt(intro)}</div>`:'';
  html+='<div class="script-card">';
  found.forEach((s,i)=>{
    const end=i<found.length-1?found[i+1].pos:text.length;
    const content=text.substring(s.pos,end).replace(s.k,'').trim();
    html+=`<div class="script-block"><div class="script-label ${s.c}">${s.l}</div><div class="script-text">${fmt(content)}</div></div>`;
  });
  html+='</div>';
  return html;
}

function fmt(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ========== SAVE MODAL (with split detection) ========== */
function splitIdeas(text){
  const patterns=[
    /(?:^|\n)\s*(?:\*\*)?(\d+)[.)]\s*\*?\*?/g,
    /(?:^|\n)\s*(?:فكرة|فيديو|سكربت|idea|video)\s*(?:#)?(\d+)[:\s.\-—]/gi,
  ];
  let positions=[];
  for(const pat of patterns){
    let m;while((m=pat.exec(text))!==null){positions.push({idx:m.index,num:parseInt(m[1])});}
    if(positions.length>=2)break;positions=[];
  }
  if(positions.length<2)return null;
  positions.sort((a,b)=>a.idx-b.idx);
  const parts=[];
  for(let i=0;i<positions.length;i++){
    const start=positions[i].idx;
    const end=i<positions.length-1?positions[i+1].idx:text.length;
    const chunk=text.substring(start,end).trim();
    if(chunk.length>15){
      const firstLine=chunk.split('\n')[0].replace(/^[\s\d.*#)(\-—:]+/,'').replace(/\*\*/g,'').trim();
      const title=firstLine.length>50?firstLine.substring(0,50)+'...':firstLine;
      parts.push({title,content:chunk});
    }
  }
  return parts.length>=2?parts:null;
}

}

}

    const id='s'+Date.now();

  }catch(e){
    console.error('Save error:',e);
    showToast('⚠️ خطأ بالحفظ: '+e.message);

}

async function delScript(id){
  if(!confirm('حذف السكربت؟'))return;

function togScript(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);renderScripts();}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
