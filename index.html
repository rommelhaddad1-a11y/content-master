<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Content Master">
<title>Content Master — Romel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #06060A;
  --bg2:     #0C0C14;
  --card:    #101018;
  --card2:   #16161F;
  --border:  rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.12);
  --red:     #E11D48;
  --red-dim: rgba(225,29,72,.12);
  --red-glow:rgba(225,29,72,.3);
  --red2:    #9F1239;
  --gold:    #D4A843;
  --blue:    #3B82F6;
  --green:   #10B981;
  --txt:     #F0F0F8;
  --txt2:    #7070A0;
  --txt3:    #303050;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Noto Naskh Arabic', serif;
  display: flex;
  flex-direction: column;
  height: 100dvh;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:.4;
}
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── HEADER ── */
.hdr {
  flex-shrink:0;
  padding:14px 16px 12px;
  background:linear-gradient(180deg,#0A0A12 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  position:relative; z-index:10;
}
.hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon {
  width:36px; height:36px;
  background:var(--red); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  box-shadow:0 0 16px var(--red-glow);
  flex-shrink:0;
}
.brand-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; line-height:1; }
.brand-sub  { font-size:10px; color:var(--txt2); font-family:'DM Mono',monospace; margin-top:2px; letter-spacing:1px; }
.hdr-btns { display:flex; gap:8px; }
.hdr-btn {
  background:none; border:1px solid var(--border2); border-radius:8px;
  padding:7px 12px; font-size:11px; color:var(--txt2);
  font-family:'DM Mono',monospace; transition:.2s;
}
.hdr-btn:active { color:var(--red); border-color:var(--red); }

.track-row { display:flex; gap:8px; }
.track-btn {
  flex:1; padding:9px 12px; border-radius:10px;
  border:1.5px solid var(--border2); background:none;
  font-size:12px; font-weight:600; color:var(--txt2);
  font-family:'Noto Naskh Arabic',serif; transition:.2s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.track-btn.active-a { border-color:var(--red);  color:var(--red);  background:rgba(225,29,72,.08);  box-shadow:0 0 12px rgba(225,29,72,.15); }
.track-btn.active-b { border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,.08); box-shadow:0 0 12px rgba(59,130,246,.15); }
.track-btn.active-x { border-color:var(--gold); color:var(--gold); background:rgba(212,168,67,.08); }
.track-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ── QUICK ACTIONS ── */
.quick-row {
  flex-shrink:0; display:flex; gap:7px;
  padding:10px 16px 0; overflow-x:auto; position:relative; z-index:5;
}
.quick-row::-webkit-scrollbar { display:none; }
.qbtn {
  white-space:nowrap; padding:8px 14px; border-radius:20px;
  border:1px solid var(--border2); background:var(--card);
  color:var(--txt2); font-size:12px;
  font-family:'Noto Naskh Arabic',serif; font-weight:600; transition:.2s; flex-shrink:0;
}
.qbtn:active { border-color:var(--red); color:var(--red); background:var(--red-dim); }

/* ── MESSAGES ── */
.messages {
  flex:1; overflow-y:auto; padding:16px 14px;
  display:flex; flex-direction:column; gap:14px;
  position:relative; z-index:2;
}
.welcome {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; flex:1; text-align:center; padding:30px 20px; gap:16px;
  min-height: 100%;
}
.welcome-icon {
  width:72px; height:72px;
  background:linear-gradient(135deg,var(--red),var(--red2));
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  font-size:36px; box-shadow:0 0 40px var(--red-glow);
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow { 0%,100%{box-shadow:0 0 30px var(--red-glow)} 50%{box-shadow:0 0 60px var(--red-glow)} }
.welcome-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:3px; line-height:1.1; }
.welcome-title span { color:var(--red); }
.welcome-sub { font-size:13px; color:var(--txt2); line-height:1.7; max-width:280px; }
.welcome-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:4px; }
.welcome-chip {
  padding:7px 14px; border-radius:20px; border:1px solid var(--border2);
  font-size:12px; color:var(--txt2); background:var(--card);
  cursor:pointer; transition:.2s; font-family:'Noto Naskh Arabic',serif;
}
.welcome-chip:active { border-color:var(--red); color:var(--red); background:var(--red-dim); }

.msg { display:flex; flex-direction:column; gap:4px; animation:msgIn .25s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg.user { align-items:flex-start; }
.msg.ai   { align-items:flex-end; }
.msg-meta { font-size:10px; color:var(--txt3); font-family:'DM Mono',monospace; padding:0 4px; }
.msg-bubble {
  max-width:88%; padding:12px 16px; border-radius:16px;
  font-size:14px; line-height:1.65;
}
.msg.user .msg-bubble {
  background:var(--card2); border:1px solid var(--border2); border-bottom-right-radius:4px;
}
.msg.ai .msg-bubble {
  background:linear-gradient(135deg,#0E0E1A,#12121E);
  border:1px solid rgba(225,29,72,.2); border-bottom-left-radius:4px;
  width:100%; max-width:100%;
}
.script-card { background:var(--bg2); border:1px solid var(--border2); border-radius:12px; overflow:hidden; margin-top:8px; }
.script-section { padding:10px 14px; border-bottom:1px solid var(--border); }
.script-section:last-child { border-bottom:none; }
.script-label {
  font-size:9px; font-family:'DM Mono',monospace; font-weight:500;
  letter-spacing:2px; text-transform:uppercase; margin-bottom:5px;
  display:flex; align-items:center; gap:6px;
}
.script-label.hook   { color:var(--red); }
.script-label.body   { color:var(--gold); }
.script-label.cta    { color:var(--green); }
.script-label.bridge { color:var(--blue); }
.script-label.note   { color:var(--txt2); }
.script-content { font-size:13px; line-height:1.6; color:var(--txt); }
.track-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px; font-size:10px; font-weight:700;
  font-family:'DM Mono',monospace; margin-bottom:8px;
}
.badge-a { background:rgba(225,29,72,.15); color:var(--red); border:1px solid rgba(225,29,72,.3); }
.badge-b { background:rgba(59,130,246,.15); color:var(--blue); border:1px solid rgba(59,130,246,.3); }
.ai-text { white-space:pre-wrap; word-break:break-word; }
.ai-text strong { color:var(--txt); font-weight:700; }
.copy-row { display:flex; justify-content:flex-end; margin-top:8px; }
.copy-btn {
  background:none; border:1px solid var(--border2); border-radius:8px;
  padding:5px 12px; font-size:11px; color:var(--txt2);
  font-family:'DM Mono',monospace; transition:.2s;
}
.copy-btn:active { color:var(--green); border-color:var(--green); }
.typing-msg { display:flex; align-items:flex-end; gap:10px; }
.typing-bubble {
  background:var(--card); border:1px solid var(--border2);
  border-radius:16px; border-bottom-left-radius:4px;
  padding:14px 18px; display:flex; gap:5px; align-items:center;
}
.typing-dot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:tdot 1.2s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay:.2s; }
.typing-dot:nth-child(3) { animation-delay:.4s; }
@keyframes tdot { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

/* ── INPUT ── */
.input-area {
  flex-shrink:0; padding:12px 14px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
  background:linear-gradient(0deg,var(--bg) 0%,transparent 100%);
  position:relative; z-index:10;
}
.input-wrap {
  display:flex; gap:10px; align-items:flex-end;
  background:var(--card); border:1.5px solid var(--border2);
  border-radius:18px; padding:8px 8px 8px 14px; transition:border-color .2s;
}
.input-wrap:focus-within { border-color:rgba(225,29,72,.4); }
.msg-input {
  flex:1; background:none; border:none; color:var(--txt);
  font-size:15px; font-family:'Noto Naskh Arabic',serif;
  resize:none; max-height:120px; line-height:1.5; padding:4px 0; direction:rtl;
}
.msg-input::placeholder { color:var(--txt3); }
.send-btn {
  width:40px; height:40px; min-width:40px; border-radius:12px;
  background:var(--red); display:flex; align-items:center; justify-content:center;
  font-size:18px; transition:.2s; box-shadow:0 0 12px var(--red-glow); flex-shrink:0;
}
.send-btn:active { transform:scale(.92); }
.send-btn:disabled { background:var(--txt3); box-shadow:none; }

/* ── ERROR BANNER ── */
.error-banner {
  background:rgba(225,29,72,.1); border:1px solid rgba(225,29,72,.3);
  border-radius:10px; padding:10px 14px; font-size:12px; color:var(--red);
  margin:8px 14px 0; display:none; position:relative; z-index:10;
}
.error-banner.show { display:block; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div>
        <div class="brand-name">CONTENT MASTER</div>
        <div class="brand-sub">ROMEL × THE MATRIX</div>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="clearChat()">مسح ↺</button>
    </div>
  </div>
  <div class="track-row">
    <button class="track-btn active-a" id="btnA" onclick="setTrack('A')">
      <div class="track-dot" style="background:var(--red)"></div>Personal Brand
    </button>
    <button class="track-btn" id="btnX" onclick="setTrack('X')">
      <div class="track-dot" style="background:var(--gold)"></div>الاثنين
    </button>
    <button class="track-btn" id="btnB" onclick="setTrack('B')">
      <div class="track-dot" style="background:var(--blue)"></div>The Matrix
    </button>
  </div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="quick-row">
  <button class="qbtn" onclick="quickSend('اكتب لي سكربت فيديو كامل')">✍️ سكربت فيديو</button>
  <button class="qbtn" onclick="quickSend('خطة محتوى للشهر الجاي')">📅 خطة شهرية</button>
  <button class="qbtn" onclick="quickSend('أعطني 5 أفكار فيروسية')">🔥 أفكار فيروسية</button>
  <button class="qbtn" onclick="quickSend('اكتب Hook جذاب لفيديو')">⚡ Hook قوي</button>
  <button class="qbtn" onclick="quickSend('وزع فيديوهات الخميس والجمعة القادمين')">🎬 جدول التصوير</button>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">✦</div>
    <div><div class="welcome-title">مرحباً<br><span>رومل</span></div></div>
    <div class="welcome-sub">مساعدك الشخصي لإنتاج المحتوى.<br>أنا فاهم مساريك وجمهورك وأسلوبك.</div>
    <div class="welcome-chips">
      <div class="welcome-chip" onclick="quickSend('اكتب لي سكربت فيديو عن روتين الصباح من منظور طالب جامعي متداول')">روتين الصباح POV</div>
      <div class="welcome-chip" onclick="quickSend('اشرح FVG بطريقة بقدر أصوّرها فيديو')">شرح FVG</div>
      <div class="welcome-chip" onclick="quickSend('فيديو يجمع بين المسارين — بناء النفس والتداول')">ربط المسارين</div>
      <div class="welcome-chip" onclick="quickSend('خطة المحتوى للشهر الجاي بالكامل')">خطة شهر كاملة</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea class="msg-input" id="msgInput" placeholder="اسألني أي شي عن المحتوى..." rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `أنت "The Content Master" — مساعد إنتاج المحتوى الشخصي لرومل.

══ هوية رومل ══
- اسمه رومل، شاب أردني مسيحي، طالب إدارة أعمال بالجامعة
- يدير مجتمع تداول "The Matrix" على ديسكورد
- يبني Personal Brand عن "بناء الشباب بالعشرينات"
- يتداول كريبتو وفوركس بمنهجية ICT/AMD
- جدوله: جامعة الأحد-الأربعاء، تداول يومياً، تصوير الخميس والجمعة فقط

══ مسارا المحتوى ══

[TRACK A — Personal Brand "Romel"]
الجمهور: شباب عرب 18-26، طلاب وحديثو تخرج
النبرة: ملهمة، واقعية، صادقة — مش motivational speaker مزيف
المحتوى: روتين، POV جامعة/قيادة، انضباط، بناء عادات، قصص شخصية حقيقية
المنصات: TikTok / Reels / YouTube Shorts

[TRACK B — The Matrix Trading]
الجمهور: متداولون مبتدئون ومتوسطون، عرب وأجانب
النبرة: تقنية، احترافية، واثقة، مبنية على الدليل والنتائج
المحتوى: ICT/AMD، Fair Value Gaps، Order Blocks، صفقات live، نتائج موثّقة
المنصات: YouTube / TikTok / Discord

══ قواعد الإنتاج ══
- Batching: كل التصوير الخميس والجمعة فقط
- هيكل كل سكربت:
  HOOK (3-5 ثواني تخطف الانتباه — سؤال أو statement صادمة أو POV)
  BODY (المحتوى التعليمي أو القصصي — نقاط مرقّمة قابلة للتحدث)
  CTA (فعل واحد واضح — اشترك / انضم / تعلّم)
  BRIDGE (جملة ربط للمسار الثاني — اختيارية)
  FILMING NOTE (كيف يصوّر الفيديو بسرعة)
- توزيع شهري: 70% قيمة / 20% شخصي / 10% بيع وترويج

══ نقاط الربط الذهبية ══
- الانضباط في الحياة = الانضباط في التداول
- نتائج الصفقات = محتوى motivation حقيقي
- "طالب جامعي يتداول" = استحواذ على جمهور المسارين معاً

══ أسلوب ردودك ══
- مباشر وعملي — بدون مقدمات فاضية
- عند كتابة سكربت: اكتبه كامل جاهز للتصوير فوراً بالهيكل الكامل
- عند خطة شهرية: وزّع على أيام الخميس والجمعة بالتحديد
- فكّر "شو رح يشتغل فيروسي فعلاً" مش مجرد أفكار عشوائية
- استخدم العربية الشامية القريبة من رومل (أردني/شامي)
- Track B: اكتب بالعربي والإنجليزي لأن الجمهور مختلط`;

let track = 'A';
let history = [];
let isLoading = false;

function setTrack(t) {
  track = t;
  document.getElementById('btnA').className = 'track-btn' + (t==='A' ? ' active-a' : '');
  document.getElementById('btnB').className = 'track-btn' + (t==='B' ? ' active-b' : '');
  document.getElementById('btnX').className = 'track-btn' + (t==='X' ? ' active-x' : '');
}

function quickSend(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || isLoading) return;

  const welcome = document.getElementById('welcomeScreen');
  if(welcome) welcome.remove();
  hideError();

  addMessage('user', text);
  const trackNote = track==='A' ? '[Track A — Personal Brand]' : track==='B' ? '[Track B — The Matrix]' : '[كلا المسارين]';
  history.push({ role:'user', content:`${trackNote}\n${text}` });
  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  const typingEl = showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM_PROMPT }),
    });

    if(!response.ok) throw new Error(`Server error: ${response.status}`);

    const data = await response.json();
    if(data.error) throw new Error(data.error);

    const reply = data.content?.[0]?.text || 'ما في رد، حاول مرة ثانية.';
    typingEl.remove();
    history.push({ role:'assistant', content: reply });
    addMessage('ai', reply);

  } catch(err) {
    typingEl.remove();
    showError('في مشكلة بالاتصال: ' + err.message);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  scrollBottom();
}

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  if(role === 'user') {
    div.innerHTML = `<div class="msg-meta">${time}</div>
      <div class="msg-bubble">${esc(text)}</div>`;
  } else {
    const rendered = renderAI(text);
    const safeText = text.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
    div.innerHTML = `<div class="msg-bubble">${rendered}
        <div class="copy-row">
          <button class="copy-btn" onclick="copyText(this,\`${safeText}\`)">نسخ ↗</button>
        </div>
      </div>
      <div class="msg-meta">${time}</div>`;
  }
  container.appendChild(div);
  scrollBottom();
}

function renderAI(text) {
  const isScript = /HOOK|BODY|CTA|BRIDGE|FILMING/i.test(text);
  let badge = '';
  if(/Track A|Personal Brand/i.test(text))
    badge = '<div class="track-badge badge-a">✦ TRACK A — PERSONAL BRAND</div>';
  else if(/Track B|The Matrix|ماتريكس/i.test(text))
    badge = '<div class="track-badge badge-b">◈ TRACK B — THE MATRIX</div>';

  if(isScript) return badge + renderScript(text);
  return badge + `<div class="ai-text">${fmt(text)}</div>`;
}

function renderScript(text) {
  const sections = [
    {key:/HOOK[:\s]+/i,   label:'⚡ HOOK',   cls:'hook'},
    {key:/BODY[:\s]+/i,   label:'📖 BODY',   cls:'body'},
    {key:/CTA[:\s]+/i,    label:'🎯 CTA',    cls:'cta'},
    {key:/BRIDGE[:\s]+/i, label:'🔗 BRIDGE', cls:'bridge'},
    {key:/FILMING[:\s]+/i,label:'🎬 FILMING',cls:'note'},
  ];
  const matches = sections
    .map(s => ({ ...s, pos: text.search(s.key) }))
    .filter(s => s.pos >= 0)
    .sort((a,b) => a.pos - b.pos);

  if(!matches.length) return `<div class="ai-text">${fmt(text)}</div>`;

  const intro = text.substring(0, matches[0].pos).trim();
  let html = intro ? `<div class="ai-text" style="margin-bottom:10px">${fmt(intro)}</div>` : '';
  html += '<div class="script-card">';
  matches.forEach((sec,i) => {
    const end = i < matches.length-1 ? matches[i+1].pos : text.length;
    const content = text.substring(sec.pos, end).replace(sec.key,'').trim();
    html += `<div class="script-section">
      <div class="script-label ${sec.cls}">${sec.label}</div>
      <div class="script-content">${fmt(content)}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function fmt(t) {
  return esc(t)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/__(.*?)__/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTyping() {
  const c = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'typing-msg';
  d.innerHTML = `<div class="typing-bubble">
    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
  </div>`;
  c.appendChild(d);
  scrollBottom();
  return d;
}

function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='تم ✓';
    setTimeout(()=>btn.textContent='نسخ ↗', 2000);
  });
}

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = '⚠️ ' + msg;
  b.classList.add('show');
}
function hideError() { document.getElementById('errorBanner').classList.remove('show'); }
